<body>

     <br><br><br>
    <div class="container-fluid" style="display:flex; justify-content: center;">
  <div style=" display: flex; justify-content: center; align-items:flex-start; gap: 20px; padding: 20px; background-color: rgba(197, 220, 255, 0.614); border-radius:20px;box-shadow: 0 4px 15px rgba(0,0,0,0.3);">

<h1> Electric Consumption Classifier</h1>
</div>

<div style="display: flex;  gap: 20px; padding: 20px; justify-content: center; text-align:center; padding:20px;">
		<div id= "photo">
		<img src= 
   "https://i.pinimg.com/736x/43/e5/a5/43e5a5504ce2eea66afdd86193945ccd.jpg" width="200x" id ="who" style="border-radius:150px;box-shadow: 2px 2px 5px rgba(0,0,0,0.5);">

<form>
<div class="bold display-5" id="username2" style= "color: #c4d7ff;  text-shadow: 2px 2px 5px rgba(0,0,0,0.5);">

<h2> </h2>

          <input type="number" class="form-control" id="kilowatt" placeholder="Input kilowatt per hour">


  <button class="btn btn-success" type="button" onclick="classif()" style="color:#2d9bce; font-size: 17px; background-color:#ffffff">Consumption Classification</button>

  
  <button class="btn btn-success" type="button" onclick="window.location.reload()" style="color:#ffffff; font-size: 17px; background-color:#b6c8ff">Cancel/キャンセル</button>

</div>
</form>
</div>

</div>

<script>
    function classif(){
         let kwh =parseFloat(document.getElementById("kilowatt").value);

         switch (true){
            case (kwh <= 100):
                alert("Lifeline Consumer || Discounted Electricity rates");

                break;

            case (kwh <= 200):
                alert("Low Consumption || Normal Residental rates");

                break;

             case (kwh <= 300):
                alert(" Average Consumption ||Typical electricity usage ");

                break;

            case (kwh <= 500):
                alert("High Consumption || Higher electricity usage");

                break;

            case (kwh > 500):
                alert("Very High Consumption || Heavy electricity users");

                break;


         }
    }


</script>
